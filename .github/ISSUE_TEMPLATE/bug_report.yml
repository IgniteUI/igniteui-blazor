name: Bug Report
description: Create a report to help us improve
type: Bug
labels: [":bug: bug", ":new: status: new"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue...
    validations:
      required: true

  - type: dropdown
    id: hosting-model
    attributes:
      label: Hosting Model
      description: Which Blazor hosting model are you using?
      options:
        - Blazor Server
        - Blazor WebAssembly
        - Blazor Hybrid (MAUI)
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET Version
      description: The version of .NET your project targets (e.g. 8.0, 9.0).
      placeholder: e.g. 9.0
    validations:
      required: true

  - type: input
    id: igniteui-blazor-version
    attributes:
      label: Ignite UI for Blazor Version
      description: The version of Ignite UI for Blazor installed in your project.
      placeholder: e.g. 24.2.0
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component / Area
      description: Which component or area is affected?
      multiple: true
      options:
        - Accordion
        - Avatar
        - Badge
        - Banner
        - Button / Button Group
        - Calendar
        - Card
        - Carousel
        - Checkbox
        - Chip
        - Combo
        - Date Picker
        - Date Range Picker
        - Date Time Input
        - Dialog
        - Dropdown
        - Expansion Panel
        - Icon
        - Input
        - Linear Progress
        - Circular Progress
        - List
        - Mask Input
        - Navbar
        - Navigation Drawer
        - Radio / Radio Group
        - Rating
        - Select
        - Slider / Range Slider
        - Snackbar
        - Stepper
        - Switch
        - Tabs
        - Textarea
        - Tile Manager
        - Toast
        - Toggle Button
        - Tooltip
        - Tree
        - Theming / Styles
        - Layouts
        - Other
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser(s) are you experiencing the issue in?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
        - Not Applicable (Blazor Server or Hybrid)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you using?
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
    validations:
      required: false

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide a step-by-step list to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: actual-result
    attributes:
      label: Actual Result
      description: What is the actual result after following the steps to reproduce?
    validations:
      required: true

  - type: textarea
    id: expected-result
    attributes:
      label: Expected Result
      description: What is the expected result after following the steps to reproduce?
    validations:
      required: true

  - type: input
    id: reproduction-url
    attributes:
      label: Reproduction URL
      description: A link to a GitHub repository or online sample that reproduces the issue.
      placeholder: https://github.com/...
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: Attachments
      description: Attach screenshots, screen recordings, or sample projects if applicable.
    validations:
      required: false
