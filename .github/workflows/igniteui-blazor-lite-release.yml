name: IgniteUI.Blazor.Lite Release

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  VERSION: ${{ github.ref_name }}

jobs:
  release:
    name: Build & Pack NuGet
    runs-on: windows-latest
    environment: nuget-org-publish
    permissions:
      id-token: write  # enable Azure OIDC token issuance for this job
      contents: read
    

      
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5.4.0
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      - name: Install npm dependencies
        run: npm ci

      - name: Build TypeScript/Webpack assets
        run: npm run build

      - name: Copy component themes to wwwroot
        run: npm run copythemes

      - name: Restore .NET dependencies
        run: dotnet restore ./IgniteUI.Blazor.Lite.csproj

      - name: Restore .NET local tools
        run: dotnet tool restore

      - name: Build .NET library
        run: dotnet build ./IgniteUI.Blazor.Lite.csproj --no-restore --configuration Release /p:Version=${{ env.VERSION }} /p:TreatWarningsAsErrors=false

      - name: Authenticate to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign DLLs
        shell: pwsh
        run: >
          dotnet tool run sign code azure-key-vault "**/*.dll"
          --base-directory "${{ github.workspace }}/bin/${{ env.BUILD_CONFIGURATION }}"
          --azure-key-vault-url "${{ secrets.AZURE_KEYVAULT_URL }}"
          --azure-key-vault-certificate "${{ secrets.AZURE_KEYVAULT_CERTIFICATE }}"
          --azure-credential-type azure-cli
          --verbosity Warning

      - name: Validate DLL signatures
        shell: pwsh
        run: |
          $dlls = Get-ChildItem -Path "${{ github.workspace }}\bin\${{ env.BUILD_CONFIGURATION }}" -Filter "*.dll" -Recurse
          $failed = @()
          foreach ($dll in $dlls) {
            $sig = Get-AuthenticodeSignature $dll.FullName
            if ($sig.Status -ne 'Valid') {
              $failed += $dll.FullName
            }
          }
          if ($failed.Count -gt 0) {
            Write-Error "Unsigned DLLs found:`n$($failed -join "`n")"
            exit 1
          }
          Write-Host "All DLLs signed successfully."

      - name: Pack NuGet package
        run: dotnet pack --no-build --configuration Release --output ./nupkg /p:Version=${{ env.VERSION }}

      - name: Sign NuGet package
        shell: pwsh
        run: >
          dotnet tool run sign code azure-key-vault "*.nupkg"
          --base-directory "${{ github.workspace }}/nupkg"
          --azure-key-vault-url "${{ secrets.AZURE_KEYVAULT_URL }}"
          --azure-key-vault-certificate "${{ secrets.AZURE_KEYVAULT_CERTIFICATE }}"
          --azure-credential-type azure-cli
          --verbosity Warning

      - name: Validate NuGet package signature
        run: dotnet nuget verify "${{ github.workspace }}/nupkg/IgniteUI.Blazor.Lite.${{ env.VERSION }}.nupkg" -v q

      - name: NuGet login (OIDC Trusted Publishing)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841   # v1
        id: nuget-login
        with:
          user: ${{ secrets.INFRAGISTICS_NUGET_ORG_USER }}

      - name: Publish to NuGet.org
        if: false
        run: dotnet nuget push "${{ github.workspace }}/nupkg/IgniteUI.Blazor.Lite.${{ env.VERSION }}.nupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source "https://api.nuget.org/v3/index.json"
