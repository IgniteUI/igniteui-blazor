name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x', '10.0.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build TypeScript/Webpack assets
        run: npm run build

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build .NET library
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=false

      - name: Build VS Templates
        run: dotnet pack templates/IgniteUI.Blazor.Templates/

      - name: Run .NET tests with coverage
        run: >
          dotnet test --no-build --configuration Release --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Build Playwright test project
        run: >
          dotnet build ./tests/Infragistics.Blazor.Testing/Playwright.Testing/Playwright.Testing.csproj
          --configuration Release

      - name: Install Playwright
        shell: pwsh
        run: ./tests/Infragistics.Blazor.Testing/Playwright.Testing/bin/Release/net9.0/playwright.ps1 install

      - name: Run Bulk Automation
        run: >
          dotnet test ./tests/Infragistics.Blazor.Testing/Infragistics.Blazor.Testing/Infragistics.Blazor.Testing.sln
          --settings ./tests/Infragistics.Blazor.Testing/Infragistics.Blazor.Testing/.runsettings
          --no-build --configuration Release --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@c31aa4ed4f12f147061186cf2a029f307b5c3636
        with:
          reports: TestResults/**/*.cobertura.xml
          targetdir: CoverageReport
          reporttypes: HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub

      - name: Publish coverage summary
        run: cat CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.dotnet-version }}
          path: CoverageReport
          retention-days: 14
